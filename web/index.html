<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audible Sales</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="tos-banner" hidden>
    <div id="tos-inner">
      <strong>Heads up:</strong> This site uses data collected via automated access to Audible,
      which may violate Audible/Amazon's Terms of Service. By continuing you acknowledge this and
      assume any associated risk.
      <button id="tos-dismiss" onclick="dismissTos()">Got it</button>
    </div>
  </div>

  <header>
    <h1>Audible Sales</h1>
    <span id="last-updated"></span>
  </header>

  <div id="controls">

    <div class="ctrl-group">
      <div class="col-picker">
        <button id="cols-btn" onclick="toggleColPanel()">Columns ▾</button>
        <div id="col-selector" class="col-panel" hidden></div>
      </div>
    </div>

    <div class="ctrl-group">
      <label class="check-label">
        <input type="checkbox" id="favs-only" onchange="applyFilters()">
        Favourites only
      </label>
    </div>

    <div class="ctrl-group">
      <label class="ctrl-label">Libation</label>
      <input type="file" id="libation-file" accept=".csv" onchange="loadLibation(this.files[0])">
      <button id="libation-clear" onclick="clearLibation()" hidden>✕ Clear</button>
    </div>

    <div id="count"></div>

  </div>

  <div id="table-wrap">
    <table id="sales-table">
      <thead><tr></tr></thead>
      <tbody id="sales-tbody"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
